# v2
name: Refresh theme board

on:
  schedule:
    # 21:15 UTC = ~07:15 Sydney (US on EDT); 22:15 UTC covers US winter (EST).
    # Mon-Fri UTC: US close (20:00/21:00 UTC) falls on the SAME UTC weekday,
    # so 1-5 is correct — the earlier 2-6 filter skipped Monday's session.
    - cron: '15 21 * * 1-5'
    - cron: '15 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install yfinance pandas pandas-datareader
      - run: python scripts/build_data.py
      - name: Commit snapshot
        run: |
          git config user.name  "theme-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/snapshot.json
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
